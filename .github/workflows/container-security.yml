name: Container security

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: container-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verifier-images:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build verifier
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: eval/verifier
          file: eval/verifier/Dockerfile
          load: true
          pull: true
          tags: super-sol-verifier:audit
      - name: Build grader
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: eval/verifier
          file: eval/verifier/Dockerfile.grader
          load: true
          pull: true
          tags: super-sol-grader:audit
      - name: Prepare SBOM directory
        run: mkdir -p security/sbom
      - name: Generate verifier SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: super-sol-verifier:audit
          format: spdx-json
          output-file: security/sbom/verifier.spdx.json
          upload-artifact: false
      - name: Generate grader SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: super-sol-grader:audit
          format: spdx-json
          output-file: security/sbom/grader.spdx.json
          upload-artifact: false
      - name: Scan verifier
        id: scan-verifier
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: super-sol-verifier:audit
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Scan grader
        id: scan-grader
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: super-sol-grader:audit
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Upload SBOM evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: super-sol-sboms
          path: security/sbom/*.spdx.json
          if-no-files-found: error
      - name: Enforce scan gate
        if: always()
        env:
          GRADER_SCAN: ${{ steps.scan-grader.outcome }}
          VERIFIER_SCAN: ${{ steps.scan-verifier.outcome }}
        run: test "$VERIFIER_SCAN" = success && test "$GRADER_SCAN" = success
