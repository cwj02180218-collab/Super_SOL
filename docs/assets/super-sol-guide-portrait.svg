<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Super SOL 상황별 사용 가이드</title>
  <desc id="desc">Super SOL 플러그인과 벤치마크 하네스의 상황별 추천 방식 표</desc>
  <defs>
    <style>
      text { font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif; fill: #191919; }
      .title { font-size: 51px; font-weight: 800; letter-spacing: -1px; }
      .subtitle { font-size: 23px; font-weight: 500; fill: #57534e; }
      .head { font-size: 20px; font-weight: 700; fill: #57534e; }
      .cell { font-size: 21px; font-weight: 700; }
      .detail { font-size: 20px; font-weight: 500; }
      .chip { font-size: 17px; font-weight: 700; fill: #9a3412; }
      .footer { font-size: 23px; font-weight: 800; fill: #292524; }
      .label { font-size: 14px; font-weight: 800; letter-spacing: 1.5px; fill: #c2410c; }
    </style>
  </defs>
  <rect width="1080" height="1350" fill="#ffffff"/>
  <rect x="0" y="0" width="1080" height="12" fill="#f97316"/>
  <text class="label" x="60" y="68">STOCK CODEX · VERIFICATION HARNESS</text>
  <text class="title" x="60" y="130"><tspan fill="#ea580c">Super SOL</tspan><tspan> — 상황별 사용 가이드</tspan></text>
  <text class="subtitle" x="60" y="174">모델을 바꾸지 않고, 작업 뒤 검증을 놓치지 않게 만드는</text>
  <text class="subtitle" x="60" y="207">Codex 하네스</text>

  <rect x="60" y="245" width="960" height="790" rx="16" fill="#ffffff" stroke="#d6d3d1" stroke-width="2"/>
  <path d="M76 245h928a16 16 0 0 1 16 16v49H60v-49a16 16 0 0 1 16-16z" fill="#f5f5f4"/>
  <line x1="275" y1="245" x2="275" y2="1035" stroke="#e7e5e4" stroke-width="2"/>
  <line x1="565" y1="245" x2="565" y2="1035" stroke="#e7e5e4" stroke-width="2"/>
  <g stroke="#e7e5e4" stroke-width="2">
    <line x1="60" y1="310" x2="1020" y2="310"/>
    <line x1="60" y1="431" x2="1020" y2="431"/>
    <line x1="60" y1="552" x2="1020" y2="552"/>
    <line x1="60" y1="673" x2="1020" y2="673"/>
    <line x1="60" y1="794" x2="1020" y2="794"/>
    <line x1="60" y1="915" x2="1020" y2="915"/>
  </g>
  <text class="head" x="84" y="286">상황</text>
  <text class="head" x="299" y="286">추천 방식</text>
  <text class="head" x="589" y="286">판단</text>

  <g class="cell">
    <text x="84" y="375">일상 코딩</text>
    <text x="299" y="375" fill="#c2410c">●  Super SOL</text><text x="322" y="405" fill="#c2410c">플러그인</text>
    <text x="84" y="496">버그 수정</text>
    <text x="299" y="496" fill="#c2410c">●  디버그 절차</text>
    <text x="84" y="617">배포 전</text>
    <text x="299" y="617" fill="#c2410c">●  릴리즈 점검</text>
    <text x="84" y="738">무료 비교</text>
    <text x="299" y="738" fill="#c2410c">●  dry-run</text>
    <text x="84" y="849">실제</text><text x="84" y="879">벤치마크</text>
    <text x="299" y="849" fill="#c2410c">△  명시적 승인 후</text><text x="322" y="879" fill="#c2410c">live</text>
    <text x="84" y="970">자동 과금</text><text x="84" y="1000">모델 전환</text>
    <text x="299" y="984" fill="#78716c">×  사용하지 않음</text>
  </g>
  <g class="detail">
    <text x="589" y="365">변경 후 검증 누락을</text><text x="589" y="397">자동으로 확인</text>
    <text x="589" y="486">재현하고 고친 뒤 같은</text><text x="589" y="518">실패 경로를 다시 검사</text>
    <text x="589" y="607">테스트, 보안, 공급망,</text><text x="589" y="639">재현성을 함께 확인</text>
    <text x="589" y="728">모델 호출과 API 과금 없이</text><text x="589" y="760">실행 계획만 점검</text>
    <text x="589" y="839">고정된 컨테이너와</text><text x="589" y="871">기록된 조건으로만 실행</text>
    <text x="589" y="970">과금과 모델 선택은</text><text x="589" y="1002">사용자가 직접 결정</text>
  </g>

  <g>
    <rect x="60" y="1070" width="455" height="54" rx="27" fill="#fff7ed" stroke="#fed7aa"/>
    <rect x="535" y="1070" width="485" height="54" rx="27" fill="#fff7ed" stroke="#fed7aa"/>
    <rect x="60" y="1142" width="455" height="54" rx="27" fill="#fff7ed" stroke="#fed7aa"/>
    <rect x="535" y="1142" width="485" height="54" rx="27" fill="#fff7ed" stroke="#fed7aa"/>
    <text class="chip" x="92" y="1104">198 tests passed · 93% coverage</text>
    <text class="chip" x="567" y="1104">digest-pinned verifier</text>
    <text class="chip" x="92" y="1176">no automatic billable calls</text>
    <text x="567" y="1176" font-size="17" font-weight="700" fill="#78716c">v0.3.0 검토 스냅샷</text>
  </g>
  <line x1="60" y1="1238" x2="1020" y2="1238" stroke="#e7e5e4"/>
  <text class="footer" x="60" y="1287">모델이 아니라, 일을 끝까지 검증하게 만드는 하네스</text>
  <text x="60" y="1322" font-size="18" font-weight="700" fill="#ea580c">github.com/cwj02180218-collab/Super_SOL</text>
</svg>
